name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  node-checks:
    name: Node typecheck + lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "24"

      - name: Install root dependencies
        run: npm install

      - name: Install server dependencies
        run: npm install
        working-directory: server

      - name: Install frontend dependencies
        run: npm install
        working-directory: frontend

      - name: Typecheck server
        run: npm run typecheck
        working-directory: server

      - name: Typecheck frontend
        run: npm run typecheck
        working-directory: frontend

      - name: Lint server (Biome)
        run: npm run check
        working-directory: server

  python-checks:
    name: Python compile + smoke test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Python package
        run: pip install -e .

      - name: Compile check (catches syntax errors)
        run: python -m compileall src/ scripts/ -q

      - name: Smoke test (skips integration without env vars)
        run: python -m pytest tests/smoke.py -v
